<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&family=Dancing+Script&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div id="lockscreen" class="manhinhkhoa">
      <div class="lock">
        <h2>Nhập mật khẩu vào đây nè!!!</h2>
        <input
          id="PasswordInput"
          type="password"
          placeholder="Mật khẩu tình yêu..."
        />
        <br /><br />
        <button onclick="checkPassword()" class="nutmokhoa">Mở khóa</button>
        <p id="errorText"></p>
      </div>
    </div>
    <audio id="music" src="nhac.mp3" loop></audio>

    <div class="album-box">
      <h1>KÝ ỨC THANH XUÂN</h1>
      <img src="anhdau.jpg" alt="" />
      <section class="members">
        <h4>Members</h4>

        <div class="member-list">
          <div class="member-card">
            <img src="tv1.jpg" alt="" />
            <h3>AULIA NAHDHA</h3>
            <p>@aulianahdha</p>
          </div>

          <div class="member-card">
            <img src="tv2.jpg" alt="" />
            <h3>DHEA MUSTIKASANI</h3>
            <p>@dheamustika</p>
          </div>

          <div class="member-card">
            <img src="tv3.jpg" alt="" />
            <h3>NUHA RIZKI</h3>
            <p>@nuharizki</p>
          </div>

          <div class="member-card">
            <img src="tv4.jpg" alt="" />
            <h3>RIDWAN</h3>
            <p>@ridwan</p>
          </div>
          <div class="member-card">
            <img src="tv5.jpg" alt="" />
            <h3>RIDWAN</h3>
            <p>@ridwan</p>
          </div>
        </div>
      </section>
      <section class="memories">
        <h2>OUR MEMORIES</h2>

        <!-- Ảnh lớn -->
        <div class="main-image">
          <img id="bigImage" src="img1.jpg" />
        </div>

        <!-- Ảnh nhỏ -->
        <div class="thumbnails">
          <img src="img1.jpg" onclick="changeImage(this)" />
          <img src="img2.jpg" onclick="changeImage(this)" />
          <img src="img3.jpg" onclick="changeImage(this)" />
          <img src="img4.jpg" onclick="changeImage(this)" />
        </div>
      </section>
      <section class="final-message">
        <h2>Gửi bạn của tôi</h2>
        <p id="typing-text"></p>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
